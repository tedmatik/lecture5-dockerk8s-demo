apiVersion: apps/v1
kind: Deployment
metadata:
  name: lecture5-web
  labels:
    app: taskmanager
    component: web
spec:
  replicas: 3
  selector:
    matchLabels:
      app: taskmanager
      component: web
  template:
    metadata:
      labels:
        app: taskmanager
        component: web
    spec:
      containers:
      - name: web
        image: quicksand539/lecture5-webapp:v1.0
        ports:
        - containerPort: 5000
          name: http
        env:
        - name: FLASK_DEBUG
          value: "true"
        - name: SECRET_KEY
          value: "lecture5-demo-key"
        - name: DB_HOST
          value: "db"
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: "taskdb"
        - name: DB_USER
          value: "taskuser"
        - name: DB_PASSWORD
          value: "taskpass"
        - name: REDIS_HOST
          value: "redis"
        - name: REDIS_PORT
          value: "6379"
---
apiVersion: v1
kind: Service
metadata:
  name: lecture5-web-service
spec:
  type: LoadBalancer
  selector:
    app: taskmanager
    component: web
  ports:
  - port: 80
    targetPort: 5000
    protocol: TCP